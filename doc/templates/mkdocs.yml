site_name: BerryCrush Documentation
site_description: OpenAPI-driven BDD testing framework for API testing
site_url: https://doc.berrycrush.org
docs_dir: pages
site_dir: _site

extra:
  homepage: https://berrycrush.org

theme:
  name: material
  palette:
    primary: deep-purple
    accent: purple
  features:
    - navigation.instant
    - navigation.tracking
  icon:
    repo: fontawesome/solid/house

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
