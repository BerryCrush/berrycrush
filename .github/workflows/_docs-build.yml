name: Build Documentation

on:
  workflow_call:
    inputs:
      version:
        description: 'Version string (e.g., 1.2.3 or nightly)'
        required: true
        type: string
      ref:
        description: 'Git ref to checkout'
        required: true
        type: string
    outputs:
      artifact-name:
        description: 'Name of uploaded artifact'
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: docs-${{ inputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          
      - name: Setup build environment
        uses: ./.github/actions/setup-gradle
          
      - name: Checkout .github repo for assets
        uses: actions/checkout@v4
        with:
          repository: BerryCrush/.github
          path: .github-assets
          sparse-checkout: images
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install documentation tools
        run: pip install sphinx sphinx-rtd-theme myst-parser sphinx-tabs mkdocs mkdocs-material
        
      - name: Build User Reference (Sphinx)
        env:
          DOC_VERSION: ${{ inputs.version }}
          DOC_RELEASE: ${{ inputs.version }}
          DOC_TAG: ${{ contains(inputs.version, '-SNAPSHOT') && 'nightly' || format('v{0}', inputs.version) }}
        run: |
          cd doc/reference
          # Replace {{VERSION}} placeholder in RST files
          find . -name "*.rst" -exec sed -i "s/{{VERSION}}/$DOC_VERSION/g" {} \;
          sphinx-build -b html . build/manual

      - name: Build Developer Guide (Sphinx)
        run: |
          cd doc/developer
          sphinx-build -b html . build/html

      - name: Build KDoc
        run: ./gradlew dokkaGenerateHtml
        
      - name: Prepare assets for landing page
        run: |
          mkdir -p doc/pages/assets
          if [ -f .github-assets/images/berrycrush.svg ]; then
            cp .github-assets/images/berrycrush.svg doc/pages/assets/logo.svg
          fi
          
      - name: Build Landing Page (MkDocs)
        run: |
          cd doc
          mkdocs build -f mkdocs.yml
        
      - name: Assemble documentation
        run: |
          mkdir -p _docs/{developer,manual,kdoc/core,kdoc/junit,kdoc/spring}
          
          # Copy Landing Page (MkDocs output)
          cp -r doc/_site/pages/* _docs/
          
          # Copy Developer's Guide (Sphinx HTML output)
          cp -r doc/developer/build/html/* _docs/developer/
          
          # Copy User Reference (Sphinx output)
          cp -r doc/reference/build/manual/* _docs/manual/
          
          # Copy Dokka outputs from each module
          cp -r berrycrush/core/build/dokka/html/* _docs/kdoc/core/
          cp -r berrycrush/junit/build/dokka/html/* _docs/kdoc/junit/
          cp -r berrycrush/spring/build/dokka/html/* _docs/kdoc/spring/
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ inputs.version }}
          path: _docs/
          retention-days: 1
