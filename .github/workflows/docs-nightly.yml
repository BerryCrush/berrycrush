name: Docs (Nightly)

on:
  push:
    branches: [main]
    paths:
      - 'berrycrush/doc/**'
      - 'developer/*.md'
      - 'berrycrush/**/*.kt'
      - '.github/workflows/_docs-*.yml'
      - '.github/workflows/docs-nightly.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  read-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Read version from gradle.properties
        id: get-version
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: read-version
    uses: ./.github/workflows/_docs-build.yml
    with:
      version: ${{ needs.read-version.outputs.version }}
      ref: ${{ github.sha }}
      
  publish:
    needs: [read-version, build]
    uses: ./.github/workflows/_docs-publish.yml
    with:
      version: nightly
      artifact-name: ${{ needs.build.outputs.artifact-name }}
      set-current: false
