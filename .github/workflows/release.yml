name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG" >> $GITHUB_OUTPUT
          
      - name: Validate gradle.properties
        run: |
          EXPECTED="${{ steps.version.outputs.version }}-SNAPSHOT"
          ACTUAL=$(grep "^version=" gradle.properties | cut -d'=' -f2)
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "❌ Version mismatch!"
            echo "   Expected in gradle.properties: version=$EXPECTED"
            echo "   Found: version=$ACTUAL"
            echo ""
            echo "Before releasing, update gradle.properties to:"
            echo "   version=$EXPECTED"
            exit 1
          fi
          echo "✅ Version validated: $EXPECTED"

  release:
    needs: validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup build environment
        uses: ./.github/actions/setup-gradle
        
      - name: Set release version
        run: |
          sed -i "s/-SNAPSHOT//" gradle.properties
          
      - name: Build release
        run: ./gradlew build -x test
        
      - name: Publish to Maven Central
        uses: ./.github/actions/publish-maven-central
        with:
          namespace: org.berrycrush
          maven-username: ${{ secrets.MAVEN_USERNAME }}
          maven-password: ${{ secrets.MAVEN_PASSWORD }}
          signing-key: ${{ secrets.SIGNING_KEY }}
          signing-password: ${{ secrets.SIGNING_PASSWORD }}

  build-docs:
    needs: [validate, release]
    uses: ./.github/workflows/_docs-build.yml
    with:
      version: ${{ needs.validate.outputs.version }}
      ref: v${{ needs.validate.outputs.version }}

  publish-docs:
    needs: [validate, build-docs]
    uses: ./.github/workflows/_docs-publish.yml
    with:
      version: ${{ needs.validate.outputs.version }}
      artifact-name: ${{ needs.build-docs.outputs.artifact-name }}
      set-current: true
