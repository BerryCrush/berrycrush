name: Publish Documentation

on:
  workflow_call:
    inputs:
      version:
        description: 'Version string (e.g., 1.2.3 or nightly)'
        required: true
        type: string
      artifact-name:
        description: 'Artifact to download'
        required: true
        type: string
      set-current:
        description: 'Update /current redirect'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Download new version artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: _docs
          
      - name: Checkout main for templates
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: doc/templates
          path: _src
          
      - name: Download existing docs from Pages
        run: |
          PAGES_URL="https://doc.berrycrush.org"
          
          echo "Fetching existing content from $PAGES_URL..."
          
          # Download the entire existing site with all assets
          mkdir -p _existing
          wget --recursive \
               --level=10 \
               --no-parent \
               --no-host-directories \
               --directory-prefix="_existing" \
               --page-requisites \
               --reject="robots.txt" \
               --timeout=30 \
               --tries=3 \
               --wait=0.1 \
               "$PAGES_URL/" 2>&1 | tail -30 || echo "wget completed"
          
          # Fix filenames with query strings (e.g., file.js?v=xxx -> file.js)
          echo "Fixing filenames with query strings..."
          find _existing -name "*\?*" -type f | while read file; do
            newname=$(echo "$file" | sed 's/\?.*$//')
            if [ "$file" != "$newname" ]; then
              echo "  Renaming: $file -> $newname"
              mv "$file" "$newname"
            fi
          done
          
          # Show what was downloaded
          echo ""
          echo "Downloaded content:"
          find _existing -type f | head -30
          echo "..."
          echo "Total files: $(find _existing -type f | wc -l)"
          
          # Remove the version we're about to deploy (will be replaced)
          if [ -d "_existing/${{ inputs.version }}" ]; then
            echo "Removing old version ${{ inputs.version }} (will be replaced)"
            rm -rf "_existing/${{ inputs.version }}"
          fi
          
          echo ""
          echo "Versions to preserve:"
          for dir in _existing/*/; do
            if [ -d "$dir" ]; then
              name=$(basename "$dir")
              count=$(find "$dir" -type f 2>/dev/null | wc -l)
              echo "  $name: $count files"
            fi
          done
          
      - name: Prepare site structure
        run: |
          # Start with existing content as base
          if [ -d "_existing" ] && [ "$(ls -A _existing 2>/dev/null)" ]; then
            echo "Using existing content as base..."
            mv _existing _site
          else
            echo "No existing content found - fresh deployment"
            mkdir -p _site
          fi
          
          # Add the new version (removing old if exists)
          echo "Adding version: ${{ inputs.version }}"
          rm -rf "_site/${{ inputs.version }}" 2>/dev/null || true
          mkdir -p "_site/${{ inputs.version }}"
          cp -r _docs/* "_site/${{ inputs.version }}/"
          
          echo "Site structure:"
          for dir in _site/*/; do
            if [ -d "$dir" ]; then
              name=$(basename "$dir")
              count=$(find "$dir" -type f 2>/dev/null | wc -l)
              echo "  $name: $count files"
            fi
          done
          
      - name: Update /current redirect
        if: inputs.set-current
        run: |
          mkdir -p _site/current
          sed "s|__VERSION__|${{ inputs.version }}|g" _src/doc/templates/redirect.html > _site/current/index.html
          
      - name: Create root index with version selector
        run: |
          # Find all versions
          VERSIONS=$(find _site -maxdepth 1 -type d \( -name "[0-9]*" -o -name "nightly" \) | xargs -n 1 basename 2>/dev/null | sort -rV || echo "")
          echo "Versions for index: $VERSIONS"
          
          # Build version list as Markdown table
          VERSION_TABLE_FILE=$(mktemp)
          echo "| Version | Status |" > "$VERSION_TABLE_FILE"
          echo "|---------|--------|" >> "$VERSION_TABLE_FILE"
          for v in $VERSIONS; do
            if [ "$v" = "nightly" ]; then
              echo "| [**nightly**]($v/) | :material-weather-night: Latest build |" >> "$VERSION_TABLE_FILE"
            else
              echo "| [$v]($v/) | |" >> "$VERSION_TABLE_FILE"
            fi
          done
          
          # Inject version list into markdown template
          awk -v table="$(cat "$VERSION_TABLE_FILE")" '
            /<!-- VERSION_LIST -->/ { print table; next }
            { print }
          ' _src/doc/templates/pages/index.md > _src/doc/templates/pages/index.md.tmp
          mv _src/doc/templates/pages/index.md.tmp _src/doc/templates/pages/index.md
          rm "$VERSION_TABLE_FILE"
          
      - name: Setup Python for MkDocs
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Build root index with MkDocs
        run: |
          pip install mkdocs mkdocs-material
          cd _src/doc/templates
          mkdocs build
          # Copy landing page files (don't overwrite version directories)
          cp _site/index.html $GITHUB_WORKSPACE/_site/
          cp -r _site/assets $GITHUB_WORKSPACE/_site/ 2>/dev/null || true
          cp _site/sitemap.xml $GITHUB_WORKSPACE/_site/ 2>/dev/null || true
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
          
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
