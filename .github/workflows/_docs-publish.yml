name: Publish Documentation

on:
  workflow_call:
    inputs:
      version:
        description: 'Version string (e.g., 1.2.3 or nightly)'
        required: true
        type: string
      artifact-name:
        description: 'Artifact to download'
        required: true
        type: string
      set-current:
        description: 'Update /current redirect'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: _docs
          
      - name: Checkout main for templates
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: doc/templates
          path: _src
          
      - name: Fetch existing versions from Pages
        run: |
          mkdir -p _existing
          PAGES_URL="https://doc.berrycrush.org"
          
          echo "Fetching version list from $PAGES_URL..."
          
          # Try to fetch the index page
          if curl -sf "$PAGES_URL/" -o /tmp/index.html; then
            echo "Index page found, extracting version links..."
            # Extract version directories from links (e.g., href="1.0.0/" or href="nightly/")
            VERSIONS=$(grep -oP 'href="([0-9]+\.[0-9]+\.[0-9]+|nightly)/"' /tmp/index.html | grep -oP '[0-9]+\.[0-9]+\.[0-9]+|nightly' | sort -u || true)
            echo "Found versions: $VERSIONS"
            
            # Download each version's content
            for v in $VERSIONS; do
              if [ "$v" != "${{ inputs.version }}" ]; then
                echo "Downloading version $v..."
                mkdir -p "_existing/$v"
                # Use wget to recursively download
                wget -q -r -np -nH --cut-dirs=1 -P "_existing/$v" "$PAGES_URL/$v/" 2>/dev/null || echo "  Warning: Could not fully download $v"
              fi
            done
            
            # Also try to download /current if it exists
            if curl -sf "$PAGES_URL/current/" > /dev/null 2>&1; then
              mkdir -p "_existing/current"
              wget -q -np -nH --cut-dirs=1 -P "_existing/current" "$PAGES_URL/current/index.html" 2>/dev/null || true
            fi
          else
            echo "No existing index page found - this appears to be a fresh deployment"
          fi
          
          echo "Existing content:"
          ls -la _existing/ || echo "  (empty)"
          
      - name: Prepare site structure
        run: |
          mkdir -p _site
          
          # Copy existing versions
          if [ -d "_existing" ] && [ "$(ls -A _existing 2>/dev/null)" ]; then
            echo "Copying existing versions..."
            for item in _existing/*/; do
              if [ -d "$item" ]; then
                name=$(basename "$item")
                if [ "$name" != "${{ inputs.version }}" ]; then
                  echo "  Copying $name..."
                  cp -r "$item" "_site/"
                fi
              fi
            done
          fi
          
          # Add new version
          echo "Adding version: ${{ inputs.version }}"
          mkdir -p "_site/${{ inputs.version }}"
          cp -r _docs/* "_site/${{ inputs.version }}/"
          
          echo "Site structure:"
          ls -la _site/
          
      - name: Update /current redirect
        if: inputs.set-current
        run: |
          mkdir -p _site/current
          sed "s|__VERSION__|${{ inputs.version }}|g" _src/doc/templates/redirect.html > _site/current/index.html
          
      - name: Create root index with version selector
        run: |
          # Find all versions
          VERSIONS=$(find _site -maxdepth 1 -type d \( -name "[0-9]*" -o -name "nightly" \) | xargs -n 1 basename 2>/dev/null | sort -rV || echo "")
          echo "Versions for index: $VERSIONS"
          
          # Build version list as Markdown table
          VERSION_TABLE_FILE=$(mktemp)
          echo "| Version | Status |" > "$VERSION_TABLE_FILE"
          echo "|---------|--------|" >> "$VERSION_TABLE_FILE"
          for v in $VERSIONS; do
            if [ "$v" = "nightly" ]; then
              echo "| [**nightly**]($v/) | :material-weather-night: Latest build |" >> "$VERSION_TABLE_FILE"
            else
              echo "| [$v]($v/) | |" >> "$VERSION_TABLE_FILE"
            fi
          done
          
          # Inject version list into markdown template
          awk -v table="$(cat "$VERSION_TABLE_FILE")" '
            /<!-- VERSION_LIST -->/ { print table; next }
            { print }
          ' _src/doc/templates/pages/index.md > _src/doc/templates/pages/index.md.tmp
          mv _src/doc/templates/pages/index.md.tmp _src/doc/templates/pages/index.md
          rm "$VERSION_TABLE_FILE"
          
      - name: Setup Python for MkDocs
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Build root index with MkDocs
        run: |
          pip install mkdocs mkdocs-material
          cd _src/doc/templates
          mkdocs build
          # Copy landing page files
          cp _site/index.html $GITHUB_WORKSPACE/_site/
          cp -r _site/assets $GITHUB_WORKSPACE/_site/ 2>/dev/null || true
          cp _site/sitemap.xml $GITHUB_WORKSPACE/_site/ 2>/dev/null || true
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
          
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
