name: Publish Documentation

on:
  workflow_call:
    inputs:
      version:
        description: 'Version string (e.g., 1.2.3 or nightly)'
        required: true
        type: string
      artifact-name:
        description: 'Artifact to download'
        required: true
        type: string
      set-current:
        description: 'Update /current redirect'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: _docs
          
      - name: Checkout for templates
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: doc/templates
          path: _src
          
      - name: Checkout gh-pages for existing versions
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: _existing
          fetch-depth: 1
        continue-on-error: true
        
      - name: Debug existing versions
        run: |
          echo "Checking for existing versions..."
          if [ -d "_existing" ]; then
            echo "Found _existing directory:"
            ls -la _existing/ || echo "Empty or error"
          else
            echo "WARNING: _existing directory not found - existing versions will be lost!"
          fi
          
      - name: Prepare site structure
        run: |
          mkdir -p _site
          
          # Copy existing versions if they exist
          if [ -d "_existing" ]; then
            echo "Copying existing versions from gh-pages..."
            for dir in _existing/*/; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                # Skip if it's the version we're deploying
                if [ "$dirname" != "${{ inputs.version }}" ]; then
                  echo "  Copying $dirname..."
                  cp -r "$dir" "_site/"
                fi
              fi
            done
            # Copy root files if they exist
            [ -f "_existing/index.html" ] && cp "_existing/index.html" "_site/" || true
            [ -d "_existing/current" ] && cp -r "_existing/current" "_site/" || true
            echo "Existing versions copied:"
            ls -la _site/
          else
            echo "WARNING: No existing versions found - deploying only ${{ inputs.version }}"
          fi
          
          # Copy new version docs
          echo "Adding new version: ${{ inputs.version }}"
          mkdir -p _site/${{ inputs.version }}
          cp -r _docs/* _site/${{ inputs.version }}/
          
          echo "Final site structure:"
          ls -la _site/
          
      - name: Update /current redirect
        if: inputs.set-current
        run: |
          mkdir -p _site/current
          sed "s|__VERSION__|${{ inputs.version }}|g" _src/doc/templates/redirect.html > _site/current/index.html
          
      - name: Create root index with version selector
        run: |
          # Find all versions
          VERSIONS=$(ls -d _site/*/ 2>/dev/null | xargs -n 1 basename | grep -v current | sort -rV || echo "")
          
          # Build version list as Markdown table
          VERSION_TABLE_FILE=$(mktemp)
          echo "| Version | Status |" > "$VERSION_TABLE_FILE"
          echo "|---------|--------|" >> "$VERSION_TABLE_FILE"
          for v in $VERSIONS; do
            if [ "$v" = "nightly" ]; then
              echo "| [**nightly**]($v/) | :material-weather-night: Latest build |" >> "$VERSION_TABLE_FILE"
            elif [ "$v" = "current" ]; then
              continue  # Skip the redirect directory
            else
              echo "| [$v]($v/) | |" >> "$VERSION_TABLE_FILE"
            fi
          done
          
          # Inject version list into markdown template using awk
          awk -v table="$(cat "$VERSION_TABLE_FILE")" '
            /<!-- VERSION_LIST -->/ { print table; next }
            { print }
          ' _src/doc/templates/pages/index.md > _src/doc/templates/pages/index.md.tmp
          mv _src/doc/templates/pages/index.md.tmp _src/doc/templates/pages/index.md
          rm "$VERSION_TABLE_FILE"
          
      - name: Setup Python for MkDocs
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Build root index with MkDocs
        run: |
          pip install mkdocs mkdocs-material
          cd _src/doc/templates
          mkdocs build
          cp -r _site/* $GITHUB_WORKSPACE/_site/
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
          
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
