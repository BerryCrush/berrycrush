# JUnit Platform Configuration for BerryCrush Parallel Execution
#
# BerryCrush scenarios are thread-safe and support parallel execution.
# Enable these properties to run scenarios concurrently.
#
# For more details, see the BerryCrush documentation on parallel execution.

# Enable parallel execution (disabled by default)
# Uncomment to enable:
# junit.jupiter.execution.parallel.enabled=true

# Default execution mode for tests without explicit mode
# Options: same_thread, concurrent
# junit.jupiter.execution.parallel.mode.default=concurrent

# Default mode for classes (affects how scenarios within a class execute)
# junit.jupiter.execution.parallel.mode.classes.default=concurrent

# Parallelism strategy: fixed, dynamic, custom
# junit.jupiter.execution.parallel.config.strategy=fixed

# Fixed parallelism level (number of concurrent threads)
# junit.jupiter.execution.parallel.config.fixed.parallelism=4

# Dynamic parallelism factor (multiplier of available processors)
# junit.jupiter.execution.parallel.config.dynamic.factor=1

# ========================================================================
# BerryCrush-specific Configuration
# ========================================================================

# BerryCrush scenarios are thread-safe by design:
# - Each scenario gets its own ExecutionContext
# - All executors are stateless
# - HTTP client is thread-safe
#
# Use @BerryCrushConfiguration(parallelExecution = SAME_THREAD) for scenarios
# that require sequential execution (e.g., when using shareVariablesAcrossScenarios=true)
