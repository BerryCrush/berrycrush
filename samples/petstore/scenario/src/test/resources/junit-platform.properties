# JUnit Platform Configuration for BerryCrush Parallel Execution
#
# This file enables parallel execution for BerryCrush scenarios.
# Each scenario runs in its own thread with isolated ExecutionContext.

# Enable parallel execution
junit.jupiter.execution.parallel.enabled=true

# Default execution mode for tests
junit.jupiter.execution.parallel.mode.default=concurrent

# Default mode for classes
junit.jupiter.execution.parallel.mode.classes.default=concurrent

# Parallelism strategy: fixed, dynamic, or custom
junit.jupiter.execution.parallel.config.strategy=fixed

# Number of concurrent threads
junit.jupiter.execution.parallel.config.fixed.parallelism=4

# BerryCrush-specific notes:
# - Each scenario gets its own ExecutionContext by default
# - All executor components are stateless and thread-safe
# - Use @BerryCrushConfiguration(parallelExecution = SAME_THREAD) for sequential tests
# - Avoid shareVariablesAcrossScenarios=true with parallel execution
