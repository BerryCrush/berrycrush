openapi: 3.0.3
info:
  title: Messaging Service API (gRPC-Gateway Style)
  description: |
    REST API following gRPC-Gateway conventions, demonstrating how BerryCrush
    can test gRPC services exposed through REST gateways.
    
    This spec follows the patterns generated by protoc-gen-openapi from proto files:
    - Custom method patterns (e.g., `:send`, `:updateStatus`)
    - Request/Response naming conventions
    - gRPC-style path parameters
  version: 1.0.0

servers:
  - url: http://localhost:8084
    description: Local development server

paths:
  /v1/messaging/messages:send:
    post:
      operationId: SendMessage
      summary: Send a new message
      description: Creates and sends a message to a recipient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Message sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMessageResponse'
        '400':
          description: Invalid request

  /v1/messaging/messages/{messageId}:
    get:
      operationId: GetMessage
      summary: Get a message by ID
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Message details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '404':
          description: Message not found
    
    delete:
      operationId: DeleteMessage
      summary: Delete a message
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Message deleted
        '404':
          description: Message not found

  /v1/messaging/messages:
    get:
      operationId: ListMessages
      summary: List messages
      parameters:
        - name: recipientId
          in: query
          schema:
            type: string
        - name: senderId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [MESSAGE_STATUS_UNSPECIFIED, PENDING, SENT, DELIVERED, READ, FAILED]
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 100
        - name: pageToken
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMessagesResponse'

  /v1/messaging/messages/{messageId}:updateStatus:
    post:
      operationId: UpdateMessageStatus
      summary: Update message delivery status
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStatusRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '404':
          description: Message not found

  /v1/messaging/messages:batchSend:
    post:
      operationId: BatchSendMessages
      summary: Send multiple messages in a batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchSendRequest'
      responses:
        '200':
          description: Batch sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchSendResponse'
        '400':
          description: Invalid request

components:
  schemas:
    SendMessageRequest:
      type: object
      required:
        - senderId
        - recipientId
        - content
      properties:
        senderId:
          type: string
          description: ID of the sender
        recipientId:
          type: string
          description: ID of the recipient
        content:
          type: string
          description: Message content
        priority:
          type: integer
          description: Message priority (0 = normal, higher = more urgent)

    SendMessageResponse:
      type: object
      properties:
        messageId:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time
        status:
          type: string

    Message:
      type: object
      properties:
        id:
          type: integer
          format: int64
        senderId:
          type: string
        recipientId:
          type: string
        content:
          type: string
        timestamp:
          type: string
          format: date-time
        status:
          type: string
          enum: [MESSAGE_STATUS_UNSPECIFIED, PENDING, SENT, DELIVERED, READ, FAILED]
        priority:
          type: integer

    ListMessagesResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        nextPageToken:
          type: string
          description: Token for the next page of results

    UpdateStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [MESSAGE_STATUS_UNSPECIFIED, PENDING, SENT, DELIVERED, READ, FAILED]

    BatchSendRequest:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/SendMessageRequest'

    BatchSendResponse:
      type: object
      properties:
        messageIds:
          type: array
          items:
            type: integer
            format: int64
        successCount:
          type: integer
