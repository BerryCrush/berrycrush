openapi: 3.1.0
info:
  title: Tic Tac Toe
  description: |
    This API allows writing down marks on a Tic Tac Toe board
    and requesting the state of the board or of individual squares.
  version: 1.0.0
tags:
  - name: Gameplay

paths:
  /board:
    get:
      summary: Get the whole board
      description: Retrieves the current state of the board and the winner.
      tags:
        - Gameplay
      operationId: getBoard
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status'

  /board/reset:
    post:
      summary: Reset the game board
      description: Resets the board to empty state for a new game.
      tags:
        - Gameplay
      operationId: resetBoard
      responses:
        '200':
          description: Board reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status'

  /board/{row}/{column}:
    parameters:
      - $ref: '#/components/parameters/rowParam'
      - $ref: '#/components/parameters/columnParam'
    get:
      summary: Get a single board square
      description: Retrieves the requested square.
      tags:
        - Gameplay
      operationId: getSquare
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mark'
          links:
            markSquare:
              description: Operation to use if the mark value returned indicates the square is empty
              operationId: putSquare
              parameters:
                row: $request.path.row
                column: $request.path.column
        '400':
          description: The provided parameters are incorrect
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/errorMessage'
              example: Illegal coordinates
    put:
      summary: Set a single board square
      description: Places a mark on the board and retrieves the whole board and the winner (if any).
      tags:
        - Gameplay
      operationId: putSquare
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/markRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status'
        '400':
          description: The provided parameters are incorrect
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/errorMessage'
              examples:
                illegalCoordinates:
                  value: Illegal coordinates.
                notEmpty:
                  value: Square is not empty.
                invalidMark:
                  value: Invalid Mark (X or O).
      callbacks:
        statusCallback:
          '{$request.header.progressUrl}':
            post:
              summary: Status of mark operation
              description: Provides the status of the mark operation
              operationId: markOperationCallback
              requestBody:
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/status'
              responses:
                '200':
                  description: Mark operation status received

components:
  parameters:
    rowParam:
      description: Board row (vertical coordinate)
      name: row
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/coordinate'
    columnParam:
      description: Board column (horizontal coordinate)
      name: column
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/coordinate'

  schemas:
    errorMessage:
      type: string
      maxLength: 256
      description: A text message describing an error

    coordinate:
      type: integer
      minimum: 1
      maximum: 3
      example: 1

    mark:
      type: string
      enum:
        - .
        - X
        - O
      description: Possible values for a board square. `.` means empty square.
      example: .

    markRequest:
      type: object
      required:
        - mark
      properties:
        mark:
          $ref: '#/components/schemas/mark'

    board:
      type: array
      maxItems: 3
      minItems: 3
      items:
        type: array
        maxItems: 3
        minItems: 3
        items:
          $ref: '#/components/schemas/mark'

    winner:
      type: string
      enum:
        - .
        - X
        - O
      description: Winner of the game. `.` means nobody has won yet.
      example: .

    status:
      type: object
      properties:
        winner:
          $ref: '#/components/schemas/winner'
        board:
          $ref: '#/components/schemas/board'

webhooks:
  markStatus:
    post:
      summary: Status of mark operation
      description: Provides the status of the mark operation on completion
      operationId: markOperationWebhook
      responses:
        '200':
          description: Mark operation has completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/status'
